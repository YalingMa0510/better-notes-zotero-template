-
    name: '[QuickInsertV2]'
    text: "<p>\n    <a href=\"${link}\">\n      ${linkText}\n    </a>\n  </p>"
-
    name: '[QuickBackLinkV2]'
    text: "<p>\n    Referred in\n    <a href=\"${link}\">\n      ${linkText}\n    </a>\n  </p>"
-
    name: '[QuickImportV2]'
    text: "<blockquote>\n  ${await new Promise(async (r) => {\n    r(await Zotero.BetterNotes.api.convert.link2html(link, {noteItem, dryRun: _env.dryRun}));\n  })}\n  </blockquote>"
-
    name: '[QuickNoteV5]'
    text: "${await new Promise(async (r) => {\n    let res = \"\";\n    if (annotationItem.annotationComment) {\n      res += await Zotero.BetterNotes.api.convert.md2html(\n        annotationItem.annotationComment\n      );\n    }\n    res += await Zotero.BetterNotes.api.convert.annotations2html([annotationItem], {noteItem, ignoreComment: true});\n    r(res);\n  })}"
-
    name: '[ExportMDFileNameV2]'
    text: '${(noteItem.getNoteTitle ? noteItem.getNoteTitle().replace(/[/\\?%*:|"<> ]/g, "-") + "-" : "")}${noteItem.key}.md'
-
    name: '[ExportMDFileHeaderV2]'
    text: "${await new Promise(async (r) => {\n    let header = {};\n    header.tags = noteItem.getTags().map((_t) => _t.tag);\n    header.parent = noteItem.parentItem\n      ? noteItem.parentItem.getField(\"title\")\n      : \"\";\n    header.collections = (\n      await Zotero.Collections.getCollectionsContainingItems([\n        (noteItem.parentItem || noteItem).id,\n      ])\n    ).map((c) => c.name);\n    r(JSON.stringify(header));\n  })}"
-
    name: '[QuickInsertV3]'
    text: "// @use-markdown\n[${linkText}](${link})"
-
    name: '[ExportMDFileContent]'
    text: "${{\n  return mdContent;\n}}$"
-
    name: '[ExportLatexFileContent]'
    text: "${{\n  return latexContent;\n}}$"
-
    name: '[item]精读：控制理论文献阅读模板'
    text: "// @author Modified from Kingw413 template for Control Theory Papers\r\n// @link https://github.com/windingwind/zotero-better-notes/discussions/598\r\n// @description 控制理论类论文通用笔记模板（MPC/DP/优化控制/鲁棒控制等方向适用）\r\n\r\n<h1 style=\"text-align: center\">${topItem.getField('title')}</h1>\r\n<hr/>\r\n\r\n<!-- ==================== META DATA ==================== -->\r\n<h2 style=\"color: #1B5E20; background-color:#F1F8E9;\">💡 Meta Data</h2>\r\n<table>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left;\">Title</p></th>\r\n        <td style=\"background-color:#dbeedd;\">${topItem.getField('title')}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">Journal</p></th>\r\n        <td style=\"background-color:#f3faf4;\">${topItem.getField('publicationTitle')}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">Authors</p></th>\r\n        <td style=\"background-color:#dbeedd;\">${topItem.getCreators().map((v)=>v.firstName+\" \"+v.lastName).join(\"; \")}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">Pub. date</p></th>\r\n        <td style=\"background-color:#f3faf4;\">${topItem.getField('date')}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">期刊标签</p></th>\r\n        <td style=\"background-color:#dbeedd;\">\r\n        ${{\r\n        let space = \" \"\r\n        return Array.prototype.map.call(\r\n          Zotero.ZoteroStyle.api.renderCell(topItem, \"publicationTags\").childNodes,\r\n          e => { e.innerText = space + e.innerText + space; return e.outerHTML }\r\n        ).join(space)\r\n        }}$\r\n        </td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">DOI</p></th>\r\n        <td style=\"background-color:#f3faf4;\">\r\n            <a href=\"https://doi.org/${topItem.getField('DOI')}\">${topItem.getField('DOI')}</a>\r\n        </td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">附件</p></th>\r\n        <td style=\"background-color:#dbeedd;\">\r\n            <a href=\"zotero://open-pdf/0_${Zotero.Items.get(topItem.getAttachments())[0].key}\">\r\n                ${Zotero.Items.get(topItem.getAttachments())[0].getFilename()}\r\n            </a>\r\n        </td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">代码/项目链接</p></th>\r\n        <td style=\"background-color:#f3faf4;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">📎 填写开源代码仓库地址（如 GitHub URL）</span></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== 摘要凝练 ==================== -->\r\n<h2 style=\"color: #E65100; background-color: #FFF8E1;\">📜 摘要凝练</h2>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 用 2-3 句话概括论文核心：针对什么系统/问题 → 提出什么方法 → 达到什么效果</span></p>\r\n\r\n<h3 style=\"color: #E65100; background-color: #FFF8E1;\">⚙️ 针对问题</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：<br/>\r\n　· 控制对象（线性/非线性、确定/随机、连续/离散时间、有限/无限时域）<br/>\r\n　· 核心难点（计算复杂度、稳定性、鲁棒性、可扩展性等）<br/>\r\n　· 现有方法的不足（作者在 Introduction 中批评了哪些方法）</span></p>\r\n\r\n<h3 style=\"color: #E65100; background-color: #FFF8E1;\">📜 基础方法 / 理论工具</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写本文依赖的基础理论和数学工具，例如：<br/>\r\n　· DP / 抽象DP框架（Bertsekas）<br/>\r\n　· Bellman方程 / Bellman算子<br/>\r\n　· Lyapunov稳定性理论<br/>\r\n　· 不变集 / 终端约束设计<br/>\r\n　· 对偶分解 / ADMM<br/>\r\n　· 鲁棒优化 / 管道MPC（Tube MPC）<br/>\r\n　· 强化学习 / 值函数逼近</span></p>\r\n\r\n<h3 style=\"color: #E65100; background-color: #FFF8E1;\">💡 提出方法 / 贡献点 / 创新点</h3>\r\n<ol>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 贡献1（算法层面：提出了什么新方法/框架）</span></li>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 贡献2（理论层面：证明了什么性质/定理）</span></li>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 贡献3（应用层面：在什么场景验证/推广了方法）</span></li>\r\n</ol>\r\n\r\n<h3 style=\"color: #E65100; background-color: #FFF8E1;\">🚀 实验效果</h3>\r\n<ul>\r\n    <li><b>仿真/实验场景</b>：<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 系统类型、状态维度、对比基准方法</span></li>\r\n    <li><b>核心指标</b>：<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 计算时间、最优性间隙、稳定吸引域大小、跟踪误差等</span></li>\r\n    <li><b>关键结论</b>：<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 方法相对基准提升了什么（定量描述）</span></li>\r\n</ul>\r\n\r\n<!-- ==================== 研究内容 ==================== -->\r\n<h2 style=\"color:#2E7D32; background-color: #F1F8E9;\">📊 研究内容</h2>\r\n<hr/>\r\n\r\n<h3 style=\"color:#2E7D32;\">一、系统建模与问题形式化</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：<br/>\r\n　· 系统方程（状态方程 x_{k+1}=f(x_k,u_k) 或 ẋ=f(x,u)，输出方程）<br/>\r\n　· 状态空间 X、控制空间 U 及约束集合 U(x)<br/>\r\n　· 代价函数定义（阶段代价 g(x,u)、终端代价 V_f(x)、折扣因子 α 等）<br/>\r\n　· 优化目标形式（有限时域/无限时域、min-max鲁棒、期望值随机等）<br/>\r\n　· 关键假设列表（连续性、可控性、代价非负性等）</span></p>\r\n\r\n<h3 style=\"color:#2E7D32;\">二、核心算法 / 方法描述</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：<br/>\r\n　· 算法流程（分步描述，对应论文中哪个公式编号）<br/>\r\n　· 关键公式的直觉含义（这个公式在做什么）<br/>\r\n　· 离线计算部分（什么东西预先算好）vs 在线计算部分（实时执行什么）<br/>\r\n　· terminal cost / terminal constraint 的构造方法（来自哪个命题/附录）</span></p>\r\n\r\n<h3 style=\"color:#2E7D32;\">三、核心命题 / 定理汇总</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 按论文顺序逐一填写每个 Proposition / Theorem / Lemma，每行一条</span></p>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#E8F5E9;\">\r\n        <th style=\"padding:6px; width:15%;\">命题/定理</th>\r\n        <th style=\"padding:6px; width:30%;\">陈述（数学形式）</th>\r\n        <th style=\"padding:6px; width:25%;\">作用 / 意义</th>\r\n        <th style=\"padding:6px; width:30%;\">证明核心思路</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 Prop 3.1</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">核心不等式或等式</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">在论文中的功能定位</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">关键工具：单调性/归纳法/夹逼/Schur补等</td>\r\n    </tr>\r\n    <tr style=\"background-color:#f3faf4;\">\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#f3faf4;\">\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<h3 style=\"color:#2E7D32;\">四、命题逻辑链（因果依赖关系）</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 用箭头描述各命题之间的依赖关系，例如：<br/>\r\n　Prop A（基础工具）→ Prop B（等价转换）→ Prop C（性质保持）→ Prop D（核心结论）<br/>\r\n　说明：哪个命题是整体基石，哪个是最终目标，哪些是中间桥梁，哪些命题互相复用</span></p>\r\n\r\n<h3 style=\"color:#2E7D32;\">五、稳定性 / 可行性分析</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：<br/>\r\n　· 稳定性保证条件（Lyapunov函数如何构造，沿轨迹是否单调递减）<br/>\r\n　· 递归可行性（终端约束的不变性如何保证每步优化问题有解）<br/>\r\n　· 性能界（最优性间隙的上界/下界，相对于 J* 的保证）<br/>\r\n　· 收敛性结论（值函数/状态是否收敛，收敛到哪里）</span></p>\r\n\r\n<h3 style=\"color:#2E7D32;\">六、算法变体 / 特殊情形</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：<br/>\r\n　· 论文提出的简化版本或推广版本（如 Section D 的 Simplified Variant）<br/>\r\n　· 退化到已有方法的特殊情形（如令某参数为特殊值时等价于经典MPC）<br/>\r\n　· 离散控制 / 混合整数 / 切换系统等特殊结构的处理方式</span></p>\r\n\r\n<!-- ==================== 理论推导 ==================== -->\r\n<h2 style=\"color:#1565C0; background-color: #E1F5FE;\">🔬 理论推导（重点证明过程）</h2>\r\n<hr/>\r\n\r\n<h3 style=\"color:#1565C0;\">核心定理证明（<span style=\"color:#9E9E9E; font-style:italic;\">✏️ 填入定理名称</span>）</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 按以下结构记录证明过程：</span></p>\r\n<p><b>【前提条件】</b><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 需要哪些假设 / 已证命题作为输入</span></p>\r\n<p><b>【第一步】</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 步骤名称（如：利用等价转换）</span><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 写出数学推导过程，标注每个等号/不等号的来源</span></p>\r\n<p><b>【第二步】</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 步骤名称</span><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 写出数学推导过程</span></p>\r\n<p><b>【第三步】</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 步骤名称</span><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 写出数学推导过程</span></p>\r\n<p><b>【结论】</b><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 最终得到什么不等式/等式 ■</span></p>\r\n<p><b>【证明技巧总结】</b><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 关键工具（如单调性、夹逼定理、归纳法、Schur补、S-procedure等）<br/>\r\n✏️ 易错点（如不等号方向、等号成立条件、归纳假设的范围等）<br/>\r\n✏️ 可迁移技巧（这个证明思路在哪些类似问题中可以复用）</span></p>\r\n\r\n<h3 style=\"color:#1565C0;\">关键不等式链</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填入本文最核心的不等式/等式链，并在每个符号旁注明来源命题，例如：<br/>\r\n　J*(x) ≤ [方法输出值]（Prop X）≤ [各单元界]（Prop Y）≤ terminal cost（定义）</span></p>\r\n<p style=\"font-family:monospace; background:#e8f4fd; padding:10px; border-radius:4px; line-height:2; color:#9E9E9E; font-style:italic;\">\r\n✏️ 在此处写出完整不等式链（可使用 Unicode 数学符号）\r\n</p>\r\n\r\n<h3 style=\"color:#1565C0;\">符号对照表</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 将论文中所有非标准符号/自定义记号统一列出，方便回查</span></p>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.88em;\">\r\n    <tr style=\"background-color:#E3F2FD;\">\r\n        <th style=\"padding:5px; width:20%;\">符号</th>\r\n        <th style=\"padding:5px; width:40%;\">含义</th>\r\n        <th style=\"padding:5px; width:40%;\">备注（定义位置 / 取值范围）</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:5px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 J*</td>\r\n        <td style=\"padding:5px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">最优代价函数</td>\r\n        <td style=\"padding:5px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">论文第X页，公式(Y)，取值 [0,∞]</td>\r\n    </tr>\r\n    <tr style=\"background-color:#f5f9ff;\">\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#f5f9ff;\">\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n        <td style=\"padding:5px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== 仿真结果 ==================== -->\r\n<h2 style=\"color:#4527A0; background-color: #EDE7F6;\">🧪 仿真 / 实验结果</h2>\r\n<hr/>\r\n\r\n<h3 style=\"color:#4527A0;\">实验设置</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：<br/>\r\n　· 系统参数（矩阵A、B、Q、R等具体数值或来源文献）<br/>\r\n　· 算法超参数（预测步数、单元数量、终端代价类型等）<br/>\r\n　· 对比基准方法（和什么比、为什么选这些基准）<br/>\r\n　· 运行平台（MATLAB/Python，工具箱名称，硬件配置）</span></p>\r\n\r\n<h3 style=\"color:#4527A0;\">关键结果</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 按实验场景逐行填写，重点记录定量结论</span></p>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#EDE7F6;\">\r\n        <th style=\"padding:6px;\">实验场景</th>\r\n        <th style=\"padding:6px;\">验证目标</th>\r\n        <th style=\"padding:6px;\">关键指标</th>\r\n        <th style=\"padding:6px;\">结论</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 2D-LQ</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 计算效率</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 平均计算时间（100次）</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 仅需替代方案15%的时间</td>\r\n    </tr>\r\n    <tr style=\"background-color:#f5f2ff;\">\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n        <td style=\"padding:6px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== 研究结论 ==================== -->\r\n<h2 style=\"color:#4A148C; background-color: #F5F5F5;\">🚩 研究结论</h2>\r\n<hr/>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 一句话总结：[方法名] + [理论保证] + [实验效果]，方便日后快速回忆本文贡献</span></p>\r\n\r\n<!-- ==================== 感想 & 疑问 ==================== -->\r\n<h2 style=\"color: #006064; background-color: #E0F7FA;\">📌 感想 &amp; 疑问</h2>\r\n<hr/>\r\n\r\n<h3 style=\"color:#006064;\">💡 方法论 / 证明技巧启示</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 记录可迁移到其他论文的证明思路或设计技巧，例如：<br/>\r\n　· 证明标量等式：先证≤，再证≥，最终得到=<br/>\r\n　· 证明集合等式：先证⊆，再证⊇，最终得到=<br/>\r\n　· 构造Lyapunov函数：先找不变集S，再在S上验证单调递减</span></p>\r\n<ul>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写本文特有的技巧启示</span></li>\r\n    <li></li>\r\n</ul>\r\n\r\n<h3 style=\"color:#006064;\">🔗 与已读文献的联系</h3>\r\n<ul>\r\n    <li><b>继承自</b>：<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 本文基于哪些工作（直接引用并扩展的核心文献）</span></li>\r\n    <li><b>区别于</b>：<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 与同类方法（如经典MPC、Rollout、分布式MPC）的核心差异</span></li>\r\n    <li><b>可结合</b>：<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 哪些方向（如强化学习、数据驱动、云边协同）可以与本文方法融合</span></li>\r\n</ul>\r\n\r\n<h3 style=\"color:#006064;\">❓ 未解决疑问</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 记录阅读中遇到的困惑，标注是哪一页/哪个公式，方便后续查阅或提问</span></p>\r\n<ul>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 疑问1（页码/公式编号）</span></li>\r\n    <li></li>\r\n    <li></li>\r\n</ul>\r\n\r\n<h3 style=\"color:#006064;\">📋 可能的后续研究方向</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 基于本文局限性或 Conclusion 中提到的 future work，记录可以跟进的方向</span></p>\r\n<ul>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 方向1（说明为什么有价值）</span></li>\r\n    <li></li>\r\n    <li></li>\r\n</ul>"
