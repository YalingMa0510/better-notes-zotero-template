    text: "// @author Based on Kingw413 template + Control Theory Reading Strategy\r\n// @link https://github.com/windingwind/zotero-better-notes/discussions/598\r\n// @description 控制理论文献深度阅读模板 v3（含侦察→建模→定理→实验→输出完整流程）\r\n\r\n<h1 style=\"text-align: center\">${topItem.getField('title')}</h1>\r\n<hr/>\r\n\r\n<!-- ==================== META DATA ==================== -->\r\n<h2 style=\"color: #1B5E20; background-color:#F1F8E9;\">💡 Meta Data</h2>\r\n<table>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left;\">Title</p></th>\r\n        <td style=\"background-color:#dbeedd;\">${topItem.getField('title')}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">Journal</p></th>\r\n        <td style=\"background-color:#f3faf4;\">${topItem.getField('publicationTitle')}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">Authors</p></th>\r\n        <td style=\"background-color:#dbeedd;\">${topItem.getCreators().map((v)=>v.firstName+\" \"+v.lastName).join(\"; \")}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">Pub. date</p></th>\r\n        <td style=\"background-color:#f3faf4;\">${topItem.getField('date')}</td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">期刊标签</p></th>\r\n        <td style=\"background-color:#dbeedd;\">\r\n        ${{\r\n        let space = \" \"\r\n        return Array.prototype.map.call(\r\n          Zotero.ZoteroStyle.api.renderCell(topItem, \"publicationTags\").childNodes,\r\n          e => { e.innerText = space + e.innerText + space; return e.outerHTML }\r\n        ).join(space)\r\n        }}$\r\n        </td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">DOI</p></th>\r\n        <td style=\"background-color:#f3faf4;\">\r\n            <a href=\"https://doi.org/${topItem.getField('DOI')}\">${topItem.getField('DOI')}</a>\r\n        </td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">附件</p></th>\r\n        <td style=\"background-color:#dbeedd;\">\r\n            <a href=\"zotero://open-pdf/0_${Zotero.Items.get(topItem.getAttachments())[0].key}\">\r\n                ${Zotero.Items.get(topItem.getAttachments())[0].getFilename()}\r\n            </a>\r\n        </td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#f3faf4;\"><p style=\"text-align: left\">代码 / 项目链接</p></th>\r\n        <td style=\"background-color:#f3faf4;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">📎 填写开源代码仓库地址（如 GitHub URL）</span></td>\r\n    </tr>\r\n    <tr>\r\n        <th style=\"background-color:#dbeedd;\"><p style=\"text-align: left\">精读价值评级</p></th>\r\n        <td style=\"background-color:#dbeedd;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 从下面三档选一个填入：<br/>\r\n        ⭐⭐⭐ 精读（与研究直接相关，方法/证明有借鉴价值，投入4-8小时）<br/>\r\n        ⭐⭐ 泛读（相关领域，了解思路即可，投入30-60分钟）<br/>\r\n        ⭐ 存档（被引量高但暂时用不到，打标签存档即可）</span></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== STEP 0：读前侦察（10分钟）==================== -->\r\n<h2 style=\"color: #4A148C; background-color: #F3E5F5;\">🔍 STEP 0 · 读前侦察（先花10分钟，不要直接冲进去）</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：读前先定位，不要每篇都精读。先读摘要最后一句 + Introduction最后一段 + Conclusion第一段，3分钟决定是否精读。</p>\r\n\r\n<h3 style=\"color:#4A148C;\">📌 文献坐标系（读正文前必须搞清楚）</h3>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#F3E5F5;\">\r\n        <th style=\"padding:8px; width:35%;\">三个定位问题</th>\r\n        <th style=\"padding:8px; width:65%;\">回答（搞不清楚就问Claude）</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"><b>Q1：知识树位置</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">这篇文章在控制理论的哪个分支？（MPC / 鲁棒控制 / 分布式 / RL / 最优控制...）</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n    <tr style=\"background-color:#faf5ff;\">\r\n        <td style=\"padding:8px;\"><b>Q2：之前的主流做法及局限</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">同类问题之前怎么解决的？有什么不足？（从Introduction综述段提取）</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"><b>Q3：本文核心idea一句话</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">作者的核心创新点用最朴素的语言怎么说？</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n</table>\r\n\r\n<h3 style=\"color:#4A148C;\">🎯 读前问题清单（带着问题读，不是带着义务读）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：在读之前写下你希望这篇文献回答的1-3个具体问题。读完检验有没有得到答案。带着问题读，注意力自动集中，效率提升不止一倍。</p>\r\n<ol>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 问题1（越具体越好，例如：\"它凭什么说性能比单个lookahead好，证明在哪里？\"）</span></li>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 问题2</span></li>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 问题3</span></li>\r\n</ol>\r\n\r\n<!-- ==================== STEP 1：摘要拆骨 ==================== -->\r\n<h2 style=\"color: #E65100; background-color: #FFF8E1;\">📜 STEP 1 · 摘要拆骨（主动阅读，不是被动接收）</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：手动输入加深理解。能用自己的话写出每句，才算真的读懂。写不出来 = 没读懂，重来。</p>\r\n\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#FFF8E1;\">\r\n        <th style=\"padding:8px; width:25%;\">摘要结构</th>\r\n        <th style=\"padding:8px; width:75%;\">用自己的话填写</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"><b>研究背景 / 问题类型</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">什么系统？什么约束？什么目标？</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n    <tr style=\"background-color:#fffdf0;\">\r\n        <td style=\"padding:8px;\"><b>现有方法的 gap</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">作者认为哪里有问题？（这是整篇文章的动机）</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"><b>本文方法</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">提出了什么？关键词是什么？</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n    <tr style=\"background-color:#fffdf0;\">\r\n        <td style=\"padding:8px;\"><b>理论结果</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">证明了什么性质？（稳定性？最优性？收敛性？）</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"><b>实验结果</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">在什么问题上验证？比什么好多少？</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></td>\r\n    </tr>\r\n</table>\r\n\r\n<h3 style=\"color:#E65100;\">📋 贡献点列表（从 Introduction 最后一段抄入，后面读正文时逐一对照验证）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：引言中作者通常会用 1.2.3. 列出贡献，原文抄入后在旁边标注：读完正文后是否得到验证（✅ / ❌ / 🔶部分验证）</p>\r\n<ol>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 贡献1（原文 + 验证标记）</span></li>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 贡献2</span></li>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 贡献3</span></li>\r\n</ol>\r\n\r\n<h3 style=\"color:#E65100;\">🗺️ 引言文献地图（相关工作综述结构）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：引言每段通常对应一个相关方向。读引言时在每段旁边标注\"这段讲的是哪一类方法\"，读完就得到了领域脉络图。</p>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#FFF8E1;\">\r\n        <th style=\"padding:8px; width:30%;\">相关方向类别</th>\r\n        <th style=\"padding:8px; width:40%;\">代表工作（文献编号）</th>\r\n        <th style=\"padding:8px; width:30%;\">局限性 / 与本文的区别</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 如：经典MPC</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ [1][3][22]</span></td>\r\n        <td style=\"padding:8px;\"><span style=\"color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 单一lookahead，无法利用多计算单元</span></td>\r\n    </tr>\r\n    <tr style=\"background-color:#fffdf0;\">\r\n        <td style=\"padding:8px;\"></td>\r\n        <td style=\"padding:8px;\"></td>\r\n        <td style=\"padding:8px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:8px;\"></td>\r\n        <td style=\"padding:8px;\"></td>\r\n        <td style=\"padding:8px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#fffdf0;\">\r\n        <td style=\"padding:8px;\"></td>\r\n        <td style=\"padding:8px;\"></td>\r\n        <td style=\"padding:8px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== STEP 2：系统建模 ==================== -->\r\n<h2 style=\"color:#1565C0; background-color: #E3F2FD;\">🏗️ STEP 2 · 系统建模与问题形式化（把公式翻译成人话）</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：看到公式立刻问自己\"物理意义是什么？去掉这个约束/假设会发生什么坏事？\"认识字母 ≠ 理解公式。</p>\r\n\r\n<h3 style=\"color:#1565C0;\">系统方程与代价函数</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填写：系统方程（状态方程形式）/ 状态控制空间及约束 / 代价函数定义 / 优化目标形式（有限/无限时域、min-max等）</span></p>\r\n\r\n<h3 style=\"color:#1565C0;\">🔤 符号对照表（遇到没见过的符号立刻填入，不要猜测含义继续读）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：控制理论论文漏一个符号定义，三页后必然看不懂。翻到符号定义处，加入此表，同时写下\"人话解释\"。</p>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.88em;\">\r\n    <tr style=\"background-color:#E3F2FD;\">\r\n        <th style=\"padding:6px; width:15%;\">符号</th>\r\n        <th style=\"padding:6px; width:30%;\">数学定义</th>\r\n        <th style=\"padding:6px; width:30%;\">人话解释（物理/几何意义）</th>\r\n        <th style=\"padding:6px; width:25%;\">定义位置（页/公式号）</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 L(X)</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">{J | (TJ)(x)≤J(x), ∀x}</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">J沿系统演化方向不增大，是Lyapunov函数的抽象</td>\r\n        <td style=\"padding:6px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">p.1256, 公式(5)</td>\r\n    </tr>\r\n    <tr style=\"background-color:#f0f6ff;\">\r\n        <td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#f0f6ff;\">\r\n        <td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#f0f6ff;\">\r\n        <td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td><td style=\"padding:6px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<h3 style=\"color:#1565C0;\">⚠️ Assumption 列表（每条假设要知道\"去掉它哪里会崩\"）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：不要跳过Assumption列表！每个假设旁边写\"如果这个假设不成立，论文哪个结论会崩？\"——理解了假设的用途，证明才能读懂。</p>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#E3F2FD;\">\r\n        <th style=\"padding:7px; width:20%;\">假设编号</th>\r\n        <th style=\"padding:7px; width:35%;\">假设内容</th>\r\n        <th style=\"padding:7px; width:45%;\">⚠️ 去掉此假设哪里会崩？（对应哪个命题）</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 Assumption III.1</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">代价非负 + 最小值可达</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">Bellman算子T的单调性依赖非负性；inf→min的替换依赖最小值可达</td>\r\n    </tr>\r\n    <tr style=\"background-color:#f0f6ff;\">\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== STEP 3：算法描述 ==================== -->\r\n<h2 style=\"color:#00695C; background-color:#E0F2F1;\">⚙️ STEP 3 · 核心算法描述</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：区分\"离线计算\"（预先算好的）和\"在线计算\"（实时执行的），这是理解算法复杂度和实用性的关键。</p>\r\n\r\n<h3 style=\"color:#00695C;\">算法流程</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 分步描述算法，每步标注对应论文中的公式编号，并写出该步的直觉含义（这一步在做什么）</span></p>\r\n\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#E0F2F1;\">\r\n        <th style=\"padding:7px; width:10%;\">步骤</th>\r\n        <th style=\"padding:7px; width:20%;\">公式编号</th>\r\n        <th style=\"padding:7px; width:35%;\">数学形式</th>\r\n        <th style=\"padding:7px; width:35%;\">直觉含义（在做什么）</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">离线</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 公式(X)</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 预先计算的量</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 这一步在做什么</td>\r\n    </tr>\r\n    <tr style=\"background-color:#f0fbf9;\">\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">在线</td>\r\n        <td style=\"padding:7px;\"></td>\r\n        <td style=\"padding:7px;\"></td>\r\n        <td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">在线</td>\r\n        <td style=\"padding:7px;\"></td>\r\n        <td style=\"padding:7px;\"></td>\r\n        <td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#f0fbf9;\">\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">在线</td>\r\n        <td style=\"padding:7px;\"></td>\r\n        <td style=\"padding:7px;\"></td>\r\n        <td style=\"padding:7px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== STEP 4：定理精读 ==================== -->\r\n<h2 style=\"color:#6A1B9A; background-color:#F3E5F5;\">📐 STEP 4 · 核心定理精读（三遍法 + 五类套路识别）</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示 · 三遍法：第一遍只看陈述用人话说出来；第二遍逐步骤标注每行用了什么工具；第三遍合上论文用语言复述证明思路，卡住的地方就是没懂的地方。<br/>\r\n⚠️ 遇到 thus / therefore / finally 等逻辑词：停下来，自己验证前后逻辑是否真的成立，不要以为作者说了就对。<br/>\r\n⚠️ 遇到 Remark：必须读！Remark 通常解释定理的边界条件和直觉含义，是作者留给读者的\"解说词\"。<br/>\r\n⚠️ 遇到证毕符号 ■：回顾整个证明，用一句话总结证明思路，再翻下一页。</p>\r\n\r\n<h3 style=\"color:#6A1B9A;\">命题汇总表</h3>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.88em;\">\r\n    <tr style=\"background-color:#F3E5F5;\">\r\n        <th style=\"padding:7px; width:13%;\">命题编号</th>\r\n        <th style=\"padding:7px; width:22%;\">人话陈述<br/><span style=\"font-weight:normal; font-size:0.85em;\">若…则…（第一遍）</span></th>\r\n        <th style=\"padding:7px; width:22%;\">数学形式<br/><span style=\"font-weight:normal; font-size:0.85em;\">核心不等式/等式</span></th>\r\n        <th style=\"padding:7px; width:20%;\">在全文的作用<br/><span style=\"font-weight:normal; font-size:0.85em;\">基石/桥梁/核心结论？</span></th>\r\n        <th style=\"padding:7px; width:23%;\">证明套路识别<br/><span style=\"font-weight:normal; font-size:0.85em;\">等式/集合/性能界/稳定性/归纳？</span></th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">如 Prop 3.1</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 若各单元分别求最小，则等价于用min函数做terminal cost的单一问题</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ min_i(T^ℓJ̄_i)(x)=(T^ℓJ̄)(x)</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 基石：建立并行计算与分析工具的等价性</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 等式证明（先≤再≥）+ 归纳法</td>\r\n    </tr>\r\n    <tr style=\"background-color:#faf5ff;\">\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#faf5ff;\">\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr style=\"background-color:#faf5ff;\">\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<h3 style=\"color:#6A1B9A;\">🔗 命题逻辑链（因果依赖关系）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：所有定理不是孤立的，问Claude：\"帮我梳理这篇文献所有命题之间的依赖关系，哪个是基石，哪个是最终目标，用箭头逻辑链表示\"。</p>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 用箭头描述依赖关系，例如：<br/>\r\n　Prop A（基础工具）→ Prop B（等价转换）→ Prop C（性质保持）→ Prop D（核心结论）<br/>\r\n　并标注：哪个命题被多次复用？哪两个命题共同支撑最终结论？</span></p>\r\n\r\n<h3 style=\"color:#6A1B9A;\">🔬 重点证明逐步记录</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：每行标注\"这一步用了什么工具\"，每个≤/=旁边标注来源（引理/假设/定义编号）。精读文献一定要逐字逐句，漏一个符号对理解有很大差别！</p>\r\n<p><b>证明对象：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填入命题名称</span></p>\r\n<p><b>【前提条件】</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 需要哪些已证命题 / 假设作为输入</span></p>\r\n<p><b>【第一步】</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 步骤名称（如：利用等价转换）</span><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 数学推导，每个等号/不等号旁标注来源</span></p>\r\n<p><b>【第二步】</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 步骤名称</span><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 数学推导</span></p>\r\n<p><b>【第三步】</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 步骤名称</span><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 数学推导</span></p>\r\n<p><b>【结论】</b><br/><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 最终得到什么 ■</span></p>\r\n<p><b>【■ 读完证明自我复述（第三遍）】</b><br/>\r\n<span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 合上论文，用自己的话说出这个证明的思路（能说出来=真的懂了；卡住的地方=还没懂，回去重读）</span></p>\r\n\r\n<h3 style=\"color:#6A1B9A;\">📊 关键不等式链</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 填入本文最核心的不等式/等式链，每个符号旁注明来源命题编号</span></p>\r\n<p style=\"font-family:monospace; background:#f5eeff; padding:10px; border-radius:4px; line-height:2.2; color:#9E9E9E; font-style:italic; font-size:0.9em;\">\r\n✏️ 例：J*(x) ≤ (T^ℓJ̄)(x)  [Prop X]  ≤ (T^{ℓ_i}J_i)(x)  [Prop Y]  ≤ J_μ̃_i(x)  [定义]\r\n</p>\r\n\r\n<!-- ==================== STEP 5：实验精读 ==================== -->\r\n<h2 style=\"color:#BF360C; background-color:#FBE9E7;\">🧪 STEP 5 · 实验结果（读三层，不只看数字）</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示 · 三层阅读法：<br/>\r\n　第一层（大多数人停在这里）：看结论数字<br/>\r\n　第二层（应该到这里）：理解实验设置，判断参数选择是否对自己方法最有利，对比基准是否公平<br/>\r\n　第三层（高手在这里）：思考实验\"没有测什么\"——作者刻意回避了哪些对比？高维情形还能用吗？</p>\r\n\r\n<h3 style=\"color:#BF360C;\">实验设置</h3>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 系统参数（矩阵/维度）/ 算法超参数 / 对比基准方法 / 运行平台（工具箱+硬件）</span></p>\r\n\r\n<h3 style=\"color:#BF360C;\">三层结果记录</h3>\r\n<table border=\"1\" style=\"border-collapse:collapse; width:100%; font-size:0.9em;\">\r\n    <tr style=\"background-color:#FBE9E7;\">\r\n        <th style=\"padding:7px; width:18%;\">实验场景</th>\r\n        <th style=\"padding:7px; width:22%;\">第一层：结论数字</th>\r\n        <th style=\"padding:7px; width:30%;\">第二层：设置是否公平？</th>\r\n        <th style=\"padding:7px; width:30%;\">第三层：没测什么？</th>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 如 Example 4.1</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 并行仅需15%时间</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 对比方法选的是否合理？参数设置是否有偏向？</td>\r\n        <td style=\"padding:7px; color:#9E9E9E; font-style:italic; font-size:0.85em;\">✏️ 没测高维情形；没测通信延迟影响</td>\r\n    </tr>\r\n    <tr style=\"background-color:#fff8f6;\">\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n    <tr>\r\n        <td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td><td style=\"padding:7px;\"></td>\r\n    </tr>\r\n</table>\r\n\r\n<!-- ==================== STEP 6：读后输出 ==================== -->\r\n<h2 style=\"color:#2E7D32; background-color:#F1F8E9;\">📤 STEP 6 · 读后必做输出（让文献真正为你所用）</h2>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：读完必做三件事：① 写一句话贡献（写不出来=没读懂）；② 提取对自己有用的点；③ 更新文献关系图。</p>\r\n\r\n<h3 style=\"color:#2E7D32;\">① 一句话贡献（能写出来才算真的读懂）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">✏️ 格式：[方法名] 针对 [问题]，提出 [方法]，证明了 [理论性质]，在 [实验] 上比 [基准] 好/快 [多少]。</p>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 在此处用一句话总结</span></p>\r\n\r\n<h3 style=\"color:#2E7D32;\">② 对我有用的点（精准提取，对应你自己的研究）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：每篇文献真正能被你借鉴的往往就1-3个点，不要贪多。你的论文贡献点很可能就藏在\"可以改进的地方\"里。</p>\r\n<ul>\r\n    <li><b>可直接用的定理/结论：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 哪个命题可以直接用在我的系统里？</span></li>\r\n    <li><b>可借鉴的证明技巧：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 哪种证明方式在我自己的推导中可以复用？</span></li>\r\n    <li><b>可以改进的地方：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 这篇文章哪里做得不够好？（这里藏着你的贡献点）</span></li>\r\n</ul>\r\n\r\n<h3 style=\"color:#2E7D32;\">③ 读前问题的答案（回头对照 STEP 0 的问题）</h3>\r\n<ol>\r\n    <li><b>问题1答案：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 得到答案了吗？（✅ 完整 / 🔶 部分 / ❌ 未解答）</span></li>\r\n    <li><b>问题2答案：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></li>\r\n    <li><b>问题3答案：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ </span></li>\r\n</ol>\r\n\r\n<h3 style=\"color:#2E7D32;\">④ 文献关系图更新</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">⚠️ 攻略提示：读完一篇，花5分钟更新文献管理系统，避免读了之后关系断层。</p>\r\n<ul>\r\n    <li><b>继承自（直接基础）：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 这篇文章的核心引用是哪几篇？</span></li>\r\n    <li><b>可对比的已读文献：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 和你Zotero里哪几篇形成直接对比关系？</span></li>\r\n    <li><b>引出的待读文献：</b><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 这篇文章引出了哪些你还没读但需要读的文献（记录编号）？</span></li>\r\n</ul>\r\n\r\n<!-- ==================== 研究结论 ==================== -->\r\n<h2 style=\"color:#4A148C; background-color: #F5F5F5;\">🚩 研究结论</h2>\r\n<hr/>\r\n<p><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 从 STEP 6 ① 的一句话贡献复制过来，方便在Zotero文献列表中快速回忆</span></p>\r\n\r\n<!-- ==================== 感想 & 疑问 ==================== -->\r\n<h2 style=\"color: #006064; background-color: #E0F7FA;\">📌 感想 &amp; 疑问</h2>\r\n<hr/>\r\n\r\n<h3 style=\"color:#006064;\">💡 证明技巧 / 可迁移方法论</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">✏️ 记录这篇文献中可以迁移到其他论文的证明思路或设计技巧（这是真正的长期积累）</p>\r\n<ul>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 技巧1（说明：在什么类型的证明中可以复用）</span></li>\r\n    <li></li>\r\n</ul>\r\n\r\n<h3 style=\"color:#006064;\">❓ 未解决疑问（标注页码/公式号，方便后续查阅）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">✏️ 精读文献逐字逐句，遇到看不懂的地方不要跳过，记在这里后续用具体提问模板问Claude：<br/>\r\n【背景】+【我的理解】+【具体困惑点】，越具体的问题越精准的回答。</p>\r\n<ul>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 疑问1（第X页 / 公式(Y)：具体困惑是什么）</span></li>\r\n    <li></li>\r\n    <li></li>\r\n</ul>\r\n\r\n<h3 style=\"color:#006064;\">📋 后续研究方向（你的 idea 池）</h3>\r\n<p style=\"color:#9E9E9E; font-style:italic; font-size:0.88em;\">✏️ 基于本文局限性或 Conclusion 中的 future work，记录可以跟进的方向（这里可能藏着你下一篇论文的选题）</p>\r\n<ul>\r\n    <li><span style=\"color:#9E9E9E; font-style:italic; font-size:0.9em;\">✏️ 方向1（说明：为什么有价值 + 需要突破的技术难点）</span></li>\r\n    <li></li>\r\n    <li></li>\r\n</ul>"
